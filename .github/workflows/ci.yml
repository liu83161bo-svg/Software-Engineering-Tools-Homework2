name: LLM Feature Spec Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  hw8-llm-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pytest

      - name: Run LLM evaluation gates
        run: python -m pytest tests/llm/test_llm_gates.py -v