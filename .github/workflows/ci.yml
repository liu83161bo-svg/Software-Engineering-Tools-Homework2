  # Session 8: LLM Feature Spec Gates
  hw8-llm-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run LLM Evaluation Gates
        run: |
          python -m pytest tests/llm/test_llm_gates.py -v